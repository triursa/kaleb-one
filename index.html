<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kaleb.one</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Georgia&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* Dark base */
    --bg-deep: #08060e;
    --bg-surface: #0d0b14;

    /* Glass */
    --glass-bg: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-hover: rgba(255, 255, 255, 0.07);

    /* Text */
    --text-primary: rgba(255, 255, 255, 0.95);
    --text-secondary: rgba(255, 255, 255, 0.55);
    --text-tertiary: rgba(255, 255, 255, 0.30);

    /* Default accent (overridden per domain) */
    --accent: #a78bfa;
    --accent-dim: rgba(167, 139, 250, 0.15);
    --accent-glow: rgba(167, 139, 250, 0.06);

    /* Layout */
    --sidebar-width: 76px;
    --sidebar-icon-size: 44px;
    --transition-smooth: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-fast: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Background Layer ─── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-ambient {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease, background 1.2s ease;
  }
  .bg-ambient.active { opacity: 1; }
  .bg-ambient.default-active { opacity: 1; background: radial-gradient(ellipse at 30% 20%, rgba(167,139,250,0.08) 0%, transparent 60%),
                                                           radial-gradient(ellipse at 70% 80%, rgba(96,165,250,0.06) 0%, transparent 60%); }

  /* Per-domain ambients */
  .bg-ambient[data-domain="watch"]  { background: radial-gradient(ellipse at 20% 30%, rgba(251,191,36,0.12) 0%, transparent 55%),
                                                 radial-gradient(ellipse at 80% 70%, rgba(251,146,60,0.06) 0%, transparent 55%); }
  .bg-ambient[data-domain="kitchen"]{ background: radial-gradient(ellipse at 25% 25%, rgba(251,146,60,0.14) 0%, transparent 55%),
                                                 radial-gradient(ellipse at 75% 75%, rgba(234,88,12,0.06) 0%, transparent 55%); }
  .bg-ambient[data-domain="masks"]  { background: radial-gradient(ellipse at 30% 20%, rgba(167,139,250,0.14) 0%, transparent 55%),
                                                 radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 55%); }
  .bg-ambient[data-domain="brain"]  { background: radial-gradient(ellipse at 25% 30%, rgba(96,165,250,0.14) 0%, transparent 55%),
                                                 radial-gradient(ellipse at 75% 70%, rgba(59,130,246,0.06) 0%, transparent 55%); }
  .bg-ambient[data-domain="read"]   { background: radial-gradient(ellipse at 20% 25%, rgba(52,211,153,0.12) 0%, transparent 55%),
                                                 radial-gradient(ellipse at 80% 75%, rgba(16,185,129,0.06) 0%, transparent 55%); }
  .bg-ambient[data-domain="world"]  { background: radial-gradient(ellipse at 30% 30%, rgba(244,114,182,0.12) 0%, transparent 55%),
                                                 radial-gradient(ellipse at 70% 70%, rgba(236,72,153,0.06) 0%, transparent 55%); }
  .bg-ambient[data-domain="music"]  { background: radial-gradient(ellipse at 40% 20%, rgba(236,72,153,0.15) 0%, transparent 55%),
                                                 radial-gradient(ellipse at 60% 80%, rgba(168,85,247,0.08) 0%, transparent 55%); }

  /* Floating particles */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    animation: particle-float 8s ease-in-out infinite;
    transition: background 0.8s ease;
    filter: blur(1px);
  }
  .particle:nth-child(1) { width: 3px; height: 3px; left: 15%; top: 20%; animation-delay: 0s; animation-duration: 12s; }
  .particle:nth-child(2) { width: 2px; height: 2px; left: 45%; top: 60%; animation-delay: -3s; animation-duration: 10s; }
  .particle:nth-child(3) { width: 4px; height: 4px; left: 70%; top: 30%; animation-delay: -6s; animation-duration: 14s; }
  .particle:nth-child(4) { width: 2px; height: 2px; left: 25%; top: 75%; animation-delay: -2s; animation-duration: 11s; }
  .particle:nth-child(5) { width: 3px; height: 3px; left: 85%; top: 50%; animation-delay: -5s; animation-duration: 13s; }
  .particle:nth-child(6) { width: 2px; height: 2px; left: 55%; top: 15%; animation-delay: -8s; animation-duration: 9s; }
  .particle.visible { opacity: 0.3; }

  @keyframes particle-float {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.15; }
    25% { transform: translate(10px, -15px) scale(1.2); opacity: 0.4; }
    50% { transform: translate(-5px, 8px) scale(0.9); opacity: 0.2; }
    75% { transform: translate(12px, 5px) scale(1.1); opacity: 0.35; }
  }

  /* ─── Layout ─── */
  .launcher {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100vh;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: var(--sidebar-width);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 6px;
    background: rgba(255, 255, 255, 0.02);
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .sidebar-logo {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--text-primary);
    background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(96,165,250,0.1));
    border: 1px solid rgba(167,139,250,0.2);
    margin-bottom: 16px;
    cursor: default;
    flex-shrink: 0;
  }

  .sidebar-divider {
    width: 28px;
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
    margin: 6px 0 10px;
    flex-shrink: 0;
  }

  .sidebar-icon {
    position: relative;
    width: var(--sidebar-icon-size);
    height: var(--sidebar-icon-size);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.35rem;
    cursor: pointer;
    transition: all var(--transition-fast);
    background: transparent;
    border: 1px solid transparent;
    flex-shrink: 0;
  }

  .sidebar-icon::after {
    content: '';
    position: absolute;
    left: -12px;
    top: 50%;
    transform: translateY(-50%) scaleY(0);
    width: 3px;
    height: 20px;
    border-radius: 0 3px 3px 0;
    background: var(--accent);
    transition: transform var(--transition-fast), background 0.3s ease;
  }

  .sidebar-icon:hover {
    background: var(--glass-hover);
    border-color: rgba(255, 255, 255, 0.1);
    transform: scale(1.08);
  }

  .sidebar-icon.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .sidebar-icon.active::after {
    transform: translateY(-50%) scaleY(1);
  }

  /* Tooltip */
  .sidebar-icon .tooltip {
    position: absolute;
    left: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%) translateX(-6px);
    background: rgba(13, 11, 20, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all var(--transition-fast);
    z-index: 100;
  }
  .sidebar-icon:hover .tooltip {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  .sidebar-spacer { flex: 1; }

  /* Status indicator in sidebar */
  .sidebar-icon .status-pip {
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 2px solid var(--bg-deep);
  }
  .status-pip.live { background: #34d399; }
  .status-pip.soon { background: #fbbf24; }

  /* ─── Main Content ─── */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
    position: relative;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.01);
    flex-shrink: 0;
  }

  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .top-bar-title {
    font-family: 'Georgia', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    transition: color 0.4s ease;
  }

  .top-bar-badge {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 6px;
    transition: all 0.3s ease;
  }

  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--text-tertiary);
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(167,139,250,0.3), rgba(96,165,250,0.2));
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
  }

  /* ─── Domain View ─── */
  .domain-view {
    flex: 1;
    display: flex;
    padding: 32px;
    gap: 28px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity var(--transition-smooth), transform var(--transition-smooth);
  }
  .domain-view.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Hero / Art panel */
  .domain-hero {
    flex: 1.3;
    border-radius: 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px) saturate(1.3);
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 32px;
    transition: border-color 0.4s ease, box-shadow 0.6s ease;
  }

  .domain-hero:hover {
    border-color: rgba(255,255,255,0.12);
  }

  .domain-hero-bg {
    position: absolute;
    inset: 0;
    opacity: 0.3;
    transition: opacity 0.8s ease, background 0.8s ease;
    z-index: 0;
  }

  .domain-hero-content {
    position: relative;
    z-index: 1;
  }

  .domain-hero-name {
    font-family: 'Georgia', serif;
    font-size: 2.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
    transition: color 0.4s ease;
  }

  .domain-hero-desc {
    font-size: 0.95rem;
    font-weight: 300;
    line-height: 1.6;
    color: var(--text-secondary);
    max-width: 420px;
    margin-bottom: 20px;
  }

  .launch-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 28px;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    transition: all var(--transition-fast);
    text-decoration: none;
    backdrop-filter: blur(8px);
  }

  .launch-btn:hover {
    background: var(--accent);
    color: var(--bg-deep);
    box-shadow: 0 0 30px var(--accent-glow), 0 0 60px var(--accent-glow);
    transform: translateY(-1px);
  }

  .launch-btn .launch-arrow {
    font-size: 1rem;
    transition: transform var(--transition-fast);
  }
  .launch-btn:hover .launch-arrow {
    transform: translateX(3px);
  }

  .launch-btn.coming-soon {
    border-color: rgba(251,191,36,0.4);
    background: rgba(251,191,36,0.08);
    color: rgba(251,191,36,0.7);
    cursor: default;
  }
  .launch-btn.coming-soon:hover {
    background: rgba(251,191,36,0.08);
    color: rgba(251,191,36,0.7);
    box-shadow: none;
    transform: none;
  }

  /* ─── Preview Panel ─── */
  .preview-panel {
    flex: 0.7;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 280px;
  }

  .preview-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(20px) saturate(1.2);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    padding: 20px;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  .preview-card:hover {
    border-color: rgba(255,255,255,0.12);
    background: var(--glass-hover);
  }

  .preview-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .preview-card-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-tertiary);
  }

  .preview-card-count {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--accent-dim);
    color: var(--accent);
    transition: all 0.3s ease;
  }

  .preview-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-secondary);
    transition: color 0.2s ease;
  }
  .preview-item:last-child { border-bottom: none; }
  .preview-item:hover { color: var(--text-primary); }

  .preview-item-icon {
    font-size: 1rem;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  .preview-item-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .preview-item-meta {
    font-size: 0.72rem;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat-item {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    backdrop-filter: blur(16px);
    padding: 16px;
    text-align: center;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  .stat-item:hover {
    border-color: rgba(255,255,255,0.12);
    background: var(--glass-hover);
  }

  .stat-value {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    transition: color 0.3s ease;
  }

  .stat-label {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
  }

  /* ─── Default (no selection) View ─── */
  .default-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    transition: opacity var(--transition-smooth);
  }

  .default-view.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
  }

  .default-title {
    font-family: 'Georgia', serif;
    font-size: 4rem;
    font-weight: 400;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .default-subtitle {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
    margin-bottom: 32px;
  }

  .default-hint {
    font-size: 0.78rem;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .default-hint .arrow-left {
    animation: hint-bounce 2s ease-in-out infinite;
  }

  @keyframes hint-bounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-6px); }
  }

  /* ─── Activity visualization (mini bar chart) ─── */
  .activity-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 40px;
    margin-top: 12px;
  }

  .activity-bar {
    width: 6px;
    border-radius: 3px 3px 0 0;
    transition: height 0.4s ease, background 0.3s ease;
  }

  /* ─── Clock ─── */
  .clock {
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  /* ─── Responsive ─── */
  @media (max-width: 900px) {
    :root { --sidebar-width: 60px; --sidebar-icon-size: 38px; }
    .domain-view { flex-direction: column; padding: 16px; gap: 16px; }
    .domain-hero { min-height: 200px; }
    .preview-panel { min-width: unset; }
    .domain-hero-name { font-size: 2rem; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 640px) {
    :root { --sidebar-width: 52px; --sidebar-icon-size: 34px; }
    .top-bar { padding: 12px 16px; }
    .top-bar-title { font-size: 1.1rem; }
    .domain-view { padding: 12px; }
    .domain-hero-name { font-size: 1.6rem; }
    .preview-panel { min-width: unset; }
    .default-title { font-size: 2.4rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }

  /* ─── Scrollbar ─── */
  .preview-panel { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
  .preview-panel::-webkit-scrollbar { width: 4px; }
  .preview-panel::-webkit-scrollbar-track { background: transparent; }
  .preview-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* ─── Context Menu ─── */
  .context-menu {
    position: fixed;
    z-index: 1000;
    min-width: 180px;
    background: rgba(13, 11, 20, 0.96);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    opacity: 0;
    transform: scale(0.95) translateY(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    pointer-events: none;
  }
  .context-menu.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }
  .context-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .context-menu-item:hover {
    background: var(--glass-hover);
    color: var(--text-primary);
  }
  .context-menu-item .ctx-icon { font-size: 1rem; width: 20px; text-align: center; }
  .context-menu-sep { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 8px; }

  /* ─── Modal ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  .modal-backdrop.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    position: fixed;
    z-index: 2001;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    min-width: 380px;
    max-width: 480px;
    background: rgba(13, 11, 20, 0.97);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 28px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 60px var(--accent-glow);
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  .modal.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title {
    font-family: 'Georgia', serif;
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;

  // ─── Typeahead search ───

  function debounceSearch(fn, delay = 350) {
    return function(...args) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  async function fetchSearchResults(query, type) {
    if (!query || query.length < 2) return [];
    try {
      const res = await fetch(`${API_BASE}/api/search/${type}?q=${encodeURIComponent(query)}`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.results || [];
    } catch {
      return [];
    }
  }

  function renderTypeaheadItems(results, type) {
    const dropdown = document.getElementById('qa-dropdown');
    if (!dropdown) return;

    if (results.length === 0) {
      dropdown.innerHTML = `<div class="typeahead-empty">No results found</div>`;
      return;
    }

    dropdown.innerHTML = results.map((r, i) => {
      const posterHtml = r.poster
        ? `<img class="typeahead-poster" src="${r.poster}" alt="" loading="lazy" />`
        : r.thumbnail
          ? `<img class="typeahead-poster" src="${r.thumbnail}" alt="" loading="lazy" />`
          : `<div class="typeahead-poster-placeholder">${type === 'book' ? '📖' : '🎬'}</div>`;
      const metaParts = [];
      if (r.year) metaParts.push(r.year);
      if (r.rating) metaParts.push(`<span class="rating">★ ${r.rating}</span>`);
      if (r.authors) metaParts.push(r.authors);
      const meta = metaParts.join(' · ');

      return `<div class="typeahead-item" data-index="${i}" data-id="${r.id}" data-title="${(r.title || '').replace(/"/g, '&quot;')}" data-year="${r.year || ''}" data-type="${r.type}">
        ${posterHtml}
        <div class="typeahead-info">
          <div class="typeahead-title">${r.title}</div>
          <div class="typeahead-meta">${meta}</div>
        </div>
      </div>`;
    }).join('');

    dropdown.classList.add('open');
  }

  function selectTypeaheadItem(el) {
    const id = el.dataset.id;

    const year = el.dataset.year;

    // For books, extract author from the meta text and populate hidden field
    if (type === 'book') {
      const metaEl = el.querySelector('.typeahead-meta');
      const authorText = metaEl?.textContent?.split('·')?.pop()?.trim();
      if (authorText && authorInput) authorInput.value = authorText;
      selectedResult.authors = authorText;
    }

    // Close dropdown
    if (dropdown) dropdown.classList.remove('open');

    // Show selected badge
    const badge = document.getElementById('qa-selected-badge');

      const posterImg = el.querySelector('img');
      badge.innerHTML = posterImg
        ? `<img src="${posterImg.src}" alt="" /> <span>${title}${year ? ` (${year})` : ''}</span> <span class="clear-selection">✕</span>`
        : `<span>${title}${year ? ` (${year})` : ''}</span> <span class="clear-selection">✕</span>`;
      badge.style.display = 'inline-flex';

  // ─── Context menu ───

  function showContextMenu(e, domain) {

  // ─── Quick-add modal ───

  function openQuickAdd(domain) {
    const config = quickAddFields[domain];
    if (!config) return;

    // Reset state
    selectedResult = null;

    // Set accent for modal
    const icon = document.querySelector(`.sidebar-icon[data-domain="${domain}"]`);
    if (icon) {
      quickAddModal.style.boxShadow = `0 24px 80px rgba(0,0,0,0.6), 0 0 60px ${icon.dataset.accentGlow}`;
      modalSubmit.style.background = icon.dataset.accentDim;

    }

    modalTitle.textContent = config.title;
    modalStatus.className = 'modal-status';
    modalStatus.textContent = '';
    modalSubmit.disabled = false;
    modalSubmit.textContent = 'Add';

    // Build form HTML
    let html = '';

    // Type selector (for watch domain: movie vs tv)
    if (config.types.length > 0) {
      html += `<div class="modal-field">
        <label>Type</label>
        <select name="type" id="qa-type">
          ${config.types.map(t => `<option value="${t.value}">${t.label}</option>`).join('')}
        </select>
      </div>`;
    }

    // Fields
    config.fields.forEach(f => {
      if (f.type === 'hidden') {
        html += `<input type="hidden" name="${f.name}" id="qa-${f.name}" value="${f.default || ''}" />`;
      } else if (f.type === 'select') {
        html += `<div class="modal-field">
          <label>${f.label}</label>
          <select name="${f.name}" id="qa-${f.name}">
            ${f.options.map(o => `<option value="${o.value}" ${o.value === f.default ? 'selected' : ''}>${o.label}</option>`).join('')}
          </select>
        </div>`;
      } else if (f.typeahead) {
        // Typeahead search field
        const searchType = f.typeahead === 'book' ? 'book' : 'movie';
        html += `<div class="modal-field">
          <label>${f.label}${f.required ? ' *' : ''}</label>
          <div class="typeahead-wrapper">
            <input type="text" name="${f.name}" id="qa-${f.name}" placeholder="${f.placeholder || ''}" ${f.required ? 'required' : ''} autocomplete="off" data-search-type="${searchType}" />
            <div class="typeahead-dropdown" id="qa-dropdown"></div>
          </div>
          <div class="selected-badge" id="qa-selected-badge" style="display:none;"></div>
        </div>`;
      } else if (f.hidden) {
        // Hidden on initial render, can be shown via fallback
        html += `<div class="modal-field" id="qa-field-${f.name}" style="display:none;">
          <label>${f.label}${f.required ? ' *' : ''}</label>
          <input type="${f.type}" name="${f.name}" id="qa-${f.name}" placeholder="${f.placeholder || ''}" />
        </div>`;
      } else {
        html += `<div class="modal-field">
          <label>${f.label}${f.required ? ' *' : ''}</label>
          <input type="${f.type}" name="${f.name}" id="qa-${f.name}" placeholder="${f.placeholder || ''}" ${f.required ? 'required' : ''} value="${f.default || ''}" />
        </div>`;
      }
    });

    modalBody.innerHTML = html;

    // Wire up typeahead search
    const titleInput = document.getElementById('qa-title');
    if (titleInput && titleInput.dataset.searchType) {
      const searchType = titleInput.dataset.searchType;

      const doSearch = debounceSearch(async (query) => {
        const dropdown = document.getElementById('qa-dropdown');
        if (!dropdown) return;
        if (query.length < 2) {
          dropdown.classList.remove('open');
          return;
        }

        dropdown.innerHTML = `<div class="typeahead-loading"><span class="spinner"></span>Searching…</div>`;
        dropdown.classList.add('open');

        // For watch, need to get the current type (movie/tv)
        let apiType = searchType;
        const typeEl = document.getElementById('qa-type');
        if (typeEl) apiType = typeEl.value;

        const res = await fetch(`${API_BASE}/api/search/${apiType}?q=${encodeURIComponent(query)}`);
        let data;
        try { data = await res.json(); } catch { data = { results: [] }; }

        // Handle fallback (e.g. Google Books quota exceeded)
        if (data.fallback) {
          dropdown.innerHTML = `<div class="typeahead-empty">Search unavailable — enter details manually</div>`;
          // Show hidden fields (e.g. author for books)
          document.querySelectorAll('.modal-field[id^="qa-field-"]').forEach(el => el.style.display = '');
          return;
        }

        const results = data.results || [];
        renderTypeaheadItems(results, apiType);
      }, 350);

      titleInput.addEventListener('input', (e) => {
        if (selectedResult) {
          // User is typing again after a selection — reset
          selectedResult = null;
          const badge = document.getElementById('qa-selected-badge');
          if (badge) badge.style.display = 'none';
        }
        doSearch(e.target.value);
      });

      // Arrow keys + Enter navigation in dropdown
      titleInput.addEventListener('keydown', (e) => {
        const dropdown = document.getElementById('qa-dropdown');
        if (!dropdown || !dropdown.classList.contains('open')) return;

        const items = dropdown.querySelectorAll('.typeahead-item');
        const highlighted = dropdown.querySelector('.typeahead-item.highlighted');
        let idx = highlighted ? parseInt(highlighted.dataset.index) : -1;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          idx = Math.min(idx + 1, items.length - 1);
          items.forEach(i => i.classList.remove('highlighted'));
          if (items[idx]) items[idx].classList.add('highlighted');
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          idx = Math.max(idx - 1, 0);
          items.forEach(i => i.classList.remove('highlighted'));
          if (items[idx]) items[idx].classList.add('highlighted');
        } else if (e.key === 'Enter' && idx >= 0 && items[idx]) {
          e.preventDefault();
          selectTypeaheadItem(items[idx]);
        } else if (e.key === 'Escape') {
          dropdown.classList.remove('open');
        }
      });

      // Click on item in dropdown
      modalBody.addEventListener('click', (e) => {
        const item = e.target.closest('.typeahead-item');
        if (item) selectTypeaheadItem(item);
      });

      // Clear selected badge
      modalBody.addEventListener('click', (e) => {
        if (e.target.classList.contains('clear-selection')) {
          selectedResult = null;
          const badge = document.getElementById('qa-selected-badge');
          if (badge) badge.style.display = 'none';
          if (titleInput) { titleInput.value = ''; titleInput.focus(); }
          const yearInput = document.getElementById('qa-year');
          if (yearInput) yearInput.value = '';
        }
      });

      // When type changes (movie ↔ tv), re-search
      const typeEl = document.getElementById('qa-type');
      if (typeEl) {
        typeEl.addEventListener('change', () => {
          if (titleInput.value.length >= 2) {
            doSearch(titleInput.value);
          }
        });
      }
    }

    // Show modal
    modalBackdrop.classList.add('visible');
    quickAddModal.classList.add('visible');

    // Focus first text input
    setTimeout(() => {
      if (titleInput) titleInput.focus();
    }, 100);
  }

  function closeModal() {
    modalBackdrop.classList.remove('visible');
    quickAddModal.classList.remove('visible');
    // Clean up typeahead
    const dropdown = document.getElementById('qa-dropdown');
    if (dropdown) dropdown.classList.remove('open');
    clearTimeout(searchTimer);
  }

  modalClose.addEventListener('click', closeModal);
  modalCancel.addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', closeModal);

  // Submit quick-add
  modalSubmit.addEventListener('click', async () => {
    const domain = contextDomain || activeDomain;
    const config = quickAddFields[domain];
    if (!config) return;

    // Collect form data
    const data = {};
    config.fields.forEach(f => {
      const el = document.getElementById(`qa-${f.name}`);
      if (el) data[f.name] = el.value;
    });

    // For watch domain, add the type
    const typeEl = document.getElementById('qa-type');
    if (typeEl) data._type = typeEl.value;

    // If a typeahead result was selected, include its ID for direct lookup
    if (selectedResult) {
      if (selectedResult.type === 'movie' || selectedResult.type === 'tv') {
        data.tmdb_id = selectedResult.id;
      } else if (selectedResult.type === 'book') {
        data.google_books_id = selectedResult.id;
        // Also set author from search result if available
        if (selectedResult.authors && !data.author) {
          data.author = selectedResult.authors;
        }
      }
    }

    // Validate required fields
    const missing = config.fields.filter(f => f.required && !data[f.name]?.trim());
    if (missing.length > 0) {
      modalStatus.className = 'modal-status error';
      modalStatus.textContent = `Required: ${missing.map(f => f.label).join(', ')}`;
      return;
    }

    // Show loading
    modalSubmit.disabled = true;
    modalStatus.className = 'modal-status loading';
    modalStatus.textContent = 'Adding…';

    try {
      let endpoint;
      if (domain === 'watch') {
        endpoint = data._type === 'tv' ? '/api/add/tv' : '/api/add/movie';
        delete data._type;
      } else if (domain === 'kitchen') {
        endpoint = '/api/add/recipe';
      } else if (domain === 'read') {
        endpoint = '/api/add/book';
      }

      const res = await fetch(`${API_BASE}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });

      const result = await res.json();

      if (res.ok && result.success) {
        modalStatus.className = 'modal-status success';
        const summary = [];
        if (result.title) summary.push(result.title);
        if (result.year) summary.push(`(${result.year})`);
        if (result.genre) summary.push(`— ${result.genre}`);
        if (result.imdbScore) summary.push(`| ${result.imdbScore}/10`);
        if (result.streaming) summary.push(`| ${result.streaming}`);
        modalStatus.textContent = `✓ Added: ${summary.join(' ')}`;
        modalSubmit.textContent = 'Done';
        setTimeout(closeModal, 2000);
      } else {
        modalStatus.className = 'modal-status error';
        modalStatus.textContent = result.error || 'Unknown error';
        modalSubmit.disabled = false;
      }
    } catch (err) {
      modalStatus.className = 'modal-status error';
      modalStatus.textContent = `Network error: ${err.message}`;
      modalSubmit.disabled = false;
    }
  });

  // Quick Add button in hero panel
  const quickAddBtn = document.getElementById('quickAddBtn');

  function updateQuickAddButton() {
    if (!quickAddBtn) return;
    const domain = activeDomain;
    if (domain && quickAddFields[domain]) {
      quickAddBtn.style.display = 'inline-flex';
    } else {
      quickAddBtn.style.display = 'none';
    }
  }

  quickAddBtn?.addEventListener('click', () => {
    if (activeDomain && quickAddFields[activeDomain]) {
      openQuickAdd(activeDomain);
    }
  });

  // ─── Keyboard navigation ───

  document.addEventListener('keydown', (e) => {
    const keys = ['watch', 'kitchen', 'masks', 'brain', 'read', 'world', 'music'];
    const num = parseInt(e.key);

    // Close modal on Escape
    if (e.key === 'Escape') {
      if (quickAddModal.classList.contains('visible')) {
        closeModal();
        return;
      }
      hideContextMenu();
      deselectDomain();
    }

    if (num >= 1 && num <= keys.length) {
      selectDomain(keys[num - 1]);
    }

    // 'n' key opens quick-add for active domain
    if (e.key === 'n' && !e.ctrlKey && !e.metaKey && activeDomain && quickAddFields[activeDomain] && !quickAddModal.classList.contains('visible')) {
      const active = document.activeElement;
      if (!active || (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' && active.tagName !== 'SELECT')) {
        e.preventDefault();
        openQuickAdd(activeDomain);
        return;
      }
    }

    // Submit modal on Enter (if input is focused)
    if (e.key === 'Enter' && quickAddModal.classList.contains('visible')) {
      const active = document.activeElement;
      if (active && (active.tagName === 'INPUT' || active.tagName === 'SELECT')) {
        modalSubmit.click();
        return;
      }
    }

    if (e.key === 'Enter' && activeDomain && domains[activeDomain]?.status === 'live') {
      if (!quickAddModal.classList.contains('visible')) {
        window.location.href = domains[activeDomain].href;
      }
    }
  });
</script>
